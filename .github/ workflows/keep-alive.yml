name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */4 * *'  # Runs every 4 days at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via API route
        run: |
          curl --fail https://daeunpark.com/api/ping

# CUSTOMIZATION INSTRUCTION

# Replace `YOUR_PRODUCTION_URL` with your actual live domain
# Example: `https://myapp.vercel.app/api/ping`